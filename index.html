<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>Currency Converter</h1>
        <form action="">
            <div class="amount">
                <label for="amnt">Enter Amount</label>
                <input type="number" id="amnt">
                
            </div>
            <div class="dropdowns">
                <div class="from">
                    <p>From</p>
                    <div class="select-container">
                        <img src="" alt="img">
                        <select name="from" id="from"></select>
                    </div>
                </div>
                <div class="to">
                    <p>To</p>
                    <div class="select-container">
                        <img src="" alt="img">
                        <select name="from" id="from"></select>
                    </div>
                </div>
            </div>
            <div class="msg">1 USD = 80INR</div>
            <button>Get Exchange Rate</button>
        </form>
    </div>
</body>
</html>
